<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>EduDemo | Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="brand">Edu<span>Demo</span></div>
        <div id="welcomeView">
            <p class="subtitle">Gestion de projets académiques</p>
            <div class="options-stack">
                <button class="choice-btn" onclick="goToLogin('Etudiant')">
                    <span class="icon">🎓</span> 
                    <div class="text"><strong>Étudiant</strong><small>Accès personnel</small></div>
                </button>
                <button class="choice-btn" onclick="goToLogin('Ecole')">
                    <span class="icon">🏫</span> 
                    <div class="text"><strong>École</strong><small>Administration</small></div>
                </button>
                <button class="choice-btn" onclick="goToLogin('Entreprise')">
                    <span class="icon">💼</span> 
                    <div class="text"><strong>Entreprise</strong><small>Partenariat</small></div>
                </button>
            </div>
        </div>
        <div id="loginView" style="display: none;">
            <button class="back-link" onclick="showWelcome()">← Retour</button>
            <h2 id="loginTitle" class="form-title">Connexion</h2>
            <form id="fakeLoginForm" class="login-form">
                <input type="text" placeholder="Identifiant" required>
                <input type="password" placeholder="Mot de passe" required>
                <button type="submit" class="btn-primary">Se connecter</button>
            </form>
        </div>
    </div>
    <script>
        let selectedRole = '';
        function goToLogin(role) {
            selectedRole = role;
            document.getElementById('welcomeView').style.display = 'none';
            document.getElementById('loginView').style.display = 'block';
            document.getElementById('loginTitle').innerText = "Accès " + role;
        }
        function showWelcome() {
            document.getElementById('welcomeView').style.display = 'block';
            document.getElementById('loginView').style.display = 'none';
        }
        document.getElementById('fakeLoginForm').onsubmit = (e) => {
            e.preventDefault();
            window.location.href = "dashboard.html?role=" + selectedRole;
        };
    </script>
</body>
</html>
