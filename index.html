<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeleton Demo - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-card">
        <div id="welcomeView">
            <h1>EduDemo Platform</h1>
            <p>Select your portal to continue</p>
            <hr>
            <div class="options">
                <button class="btn outline" onclick="showLogin('Student')">Student Portal</button>
                <button class="btn outline" onclick="showLogin('Professor')">Professor Portal</button>
                <button class="btn outline" onclick="showLogin('Company')">Company Portal</button>
            </div>
            <p class="footer-link">Already have an account? <a href="#" onclick="showLogin('User')">Connexion</a></p>
        </div>

        <div id="loginView" style="display: none;">
            <button class="back-link" onclick="showWelcome()">← Back</button>
            <h2 id="loginTitle">Connexion</h2>
            <form action="dashboard.html">
                <input type="text" placeholder="Username" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="btn solid">Login to Dashboard</button>
            </form>
        </div>
    </div>

    <script>
        function showLogin(role) {
            document.getElementById('welcomeView').style.display = 'none';
            document.getElementById('loginView').style.display = 'block';
            document.getElementById('loginTitle').innerText = role + " Connexion";
        }
        function showWelcome() {
            document.getElementById('welcomeView').style.display = 'block';
            document.getElementById('loginView').style.display = 'none';
        }
    </script>

</body>
</html>
